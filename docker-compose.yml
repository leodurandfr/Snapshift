services:
  postgres:
    image: postgres:16-alpine
    container_name: snapshift-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: snapshift
      POSTGRES_PASSWORD: snapshift
      POSTGRES_DB: snapshift
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snapshift-api
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://snapshift:snapshift@postgres:5432/snapshift
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/storage:/app/storage

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: snapshift-worker
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://snapshift:snapshift@postgres:5432/snapshift
      BROWSERTRIX_CRAWL_DIR: /browsertrix-crawls
      BROWSERTRIX_DOCKER_VOLUME: snapshift_crawl_data
    volumes:
      - ./backend/app:/app/app
      - ./backend/behaviors:/app/behaviors
      - ./backend/storage:/app/storage
      - crawl_data:/browsertrix-crawls
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    image: node:22-alpine
    container_name: snapshift-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - api
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  pgdata:
  frontend_node_modules:
  crawl_data:
    name: snapshift_crawl_data
